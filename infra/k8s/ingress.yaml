apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: docforge-ingress
  namespace: docforge
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    nginx.ingress.kubernetes.io/websocket-services: api
    nginx.ingress.kubernetes.io/proxy-set-headers: |
      X-Forwarded-For
      X-Forwarded-Proto
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - docforge.app
        - api.docforge.app
      secretName: docforge-tls
  rules:
    - host: docforge.app
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
    - host: api.docforge.app
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 8000
