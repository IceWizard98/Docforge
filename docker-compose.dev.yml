# Dev overrides — loaded on top of docker-compose.yml via `just docker-up`
# (docker compose -f docker-compose.yml -f docker-compose.dev.yml). Keeps
# dev-only concerns (hot reload, source bind mounts) OUT of the base file so the
# base stays production-shaped and prod never inherits --reload. (A plain
# `docker compose up` runs the base alone — clean, no hot reload.)
services:
  api:
    # --reload + watcher; single process. Entrypoint still runs migrations first.
    command: ["uvicorn", "api.app:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    volumes:
      - ./backend:/app

  worker:
    volumes:
      - ./backend:/app
