apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: docforge
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: docforge/worker:latest
          imagePullPolicy: Always
          command: ["celery", "-A", "workers.celery_app", "worker", "--loglevel=info"]
          envFrom:
            - configMapRef:
                name: docforge-config
            - secretRef:
                name: docforge-secrets
          resources:
            limits:
              cpu: "1"
              memory: "1Gi"
            requests:
              cpu: "250m"
              memory: "256Mi"
