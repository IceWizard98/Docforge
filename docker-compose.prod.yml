# DocForge — production override. Traefik TLS edge, replicas, no bind mounts.
# Usage: docker compose -f docker-compose.prod.yml up -d
services:
  traefik:
    image: traefik:v3.1
    command:
      - "--api.dashboard=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.address=:80"
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.email=admin@docforge.app"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - docforge_letsencrypt:/letsencrypt
    networks:
      - docforge-net
    restart: always

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: docforge
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-docforge}
      POSTGRES_DB: docforge
    volumes:
      - docforge_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docforge"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: "2G"
        reservations:
          cpus: "0.5"
          memory: "512M"
    networks:
      - docforge-net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - docforge_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "512M"
    networks:
      - docforge-net
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    # The MinIO root creds and the app's MinIO creds (api/worker via env_file:
    # .env) MUST be the same values. Compose interpolates ${MINIO_ACCESS_KEY}/
    # ${MINIO_SECRET_KEY} from the project .env, the SAME file the app reads, so
    # they stay in sync — set them ONLY in .env, never export them in the shell
    # (a shell export would override here but not in the container -> 403s).
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-docforge}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-docforge123}
    volumes:
      - docforge_minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - docforge-net
    restart: unless-stopped

  # One-shot migration runner. Owns `alembic upgrade head` so the api replicas
  # never race the same migration on cold start. Runs to completion, then exits.
  migrate:
    build:
      context: ./backend
      dockerfile: ../infra/docker/Dockerfile.api
    env_file: .env
    # RUN_MIGRATIONS=0 so the entrypoint's auto-migrate is skipped; the explicit
    # command below is the single authoritative migration run.
    environment:
      RUN_MIGRATIONS: "0"
    command: ["alembic", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - docforge-net
    restart: "no"

  api:
    build:
      context: ./backend
      dockerfile: ../infra/docker/Dockerfile.api
    expose:
      - "8000"
    env_file: .env
    # Migrations are owned by the `migrate` service; replicas must not run them.
    environment:
      RUN_MIGRATIONS: "0"
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.api.loadbalancer.server.port=8000"
      - "traefik.http.routers.api.rule=Host(`api.docforge.app`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls.certresolver=letsencrypt"
    deploy:
      mode: replicated
      replicas: 2
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - docforge-net
    restart: always

  worker:
    build:
      context: ./backend
      dockerfile: ../infra/docker/Dockerfile.worker
    env_file: .env
    environment:
      RUN_MIGRATIONS: "0"
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: "1G"
    networks:
      - docforge-net
    restart: always

  frontend:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.frontend
    expose:
      - "80"
    depends_on:
      - api
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"
      - "traefik.http.routers.frontend.rule=Host(`docforge.app`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls.certresolver=letsencrypt"
    networks:
      - docforge-net
    restart: always

volumes:
  docforge_postgres_data:
  docforge_redis_data:
  docforge_minio_data:
  docforge_letsencrypt:

networks:
  docforge-net:
    driver: bridge
